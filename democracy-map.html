<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Democracy Index</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0b0b14;
    color: #e0e0f0;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  .header {
    padding: 28px 32px 0;
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
  }

  h1 {
    font-family: 'Space Mono', monospace;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #60a5fa, #34d399);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: #6b6b8a;
    font-size: 13px;
    margin-top: 6px;
    line-height: 1.5;
  }

  .map-wrap {
    flex: 1;
    position: relative;
    padding: 16px 32px;
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
  }

  #map-svg {
    width: 100%;
    height: auto;
    border-radius: 12px;
    background: #12121c;
    box-shadow: 0 4px 40px rgba(0,0,0,0.5), inset 0 0 80px rgba(96,165,250,0.03);
    display: block;
  }

  .country-path {
    cursor: pointer;
    transition: opacity 0.2s ease;
  }

  #tooltip {
    position: fixed;
    pointer-events: none;
    z-index: 100;
    background: rgba(16, 16, 30, 0.96);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-radius: 10px;
    padding: 14px 18px;
    min-width: 190px;
    opacity: 0;
    transition: opacity 0.15s ease;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  #tooltip.visible { opacity: 1; }
  #tooltip .tt-name { font-weight: 700; font-size: 15px; margin-bottom: 8px; color: #e0e0f0; }
  #tooltip .tt-score-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  #tooltip .tt-score {
    font-size: 28px; font-family: 'Space Mono', monospace;
    font-weight: 700; line-height: 1;
  }
  #tooltip .tt-outof { font-size: 11px; color: #8888a8; line-height: 1.3; }
  #tooltip .tt-bar-bg {
    background: #1a1a2e; border-radius: 6px; height: 6px;
    overflow: hidden; margin-bottom: 8px;
  }
  #tooltip .tt-bar-fill { height: 100%; border-radius: 6px; transition: width 0.3s; }
  #tooltip .tt-category {
    font-size: 12px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  #tooltip .tt-nodata { font-size: 12px; color: #555570; }

  .legend {
    padding: 12px 32px 28px;
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
  }
  .legend-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .legend-item {
    display: flex; align-items: center; gap: 8px;
    background: #14141f; border-radius: 8px; padding: 10px 16px;
    border: 1px solid #1e1e30; flex: 1 1 160px; min-width: 150px;
  }
  .legend-swatch {
    width: 14px; height: 14px; border-radius: 4px; flex-shrink: 0;
  }
  .legend-label { font-size: 12px; font-weight: 600; }
  .legend-range { font-size: 10px; color: #6b6b8a; }

  /* Loader */
  .loader-wrap {
    display: flex; align-items: center; justify-content: center;
    height: 100vh; flex-direction: column; gap: 16px;
  }
  .spinner {
    width: 40px; height: 40px; border: 3px solid #2a2a3e;
    border-top-color: #60a5fa; border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loader" class="loader-wrap">
  <div class="spinner"></div>
  <p style="color:#a0a0b8">Loading world map data…</p>
</div>

<div id="app" style="display:none; flex-direction:column; min-height:100vh;">
  <div class="header">
    <h1>Global Democracy Index</h1>
    <p class="subtitle">Based on the Economist Intelligence Unit Democracy Index · Hover over a country for details · Scroll to zoom</p>
  </div>

  <div class="map-wrap" id="map-container">
    <svg id="map-svg"></svg>
  </div>

  <div id="tooltip">
    <div class="tt-name" id="tt-name"></div>
    <div id="tt-data">
      <div class="tt-score-row">
        <div class="tt-score" id="tt-score"></div>
        <div class="tt-outof">out of<br>10.00</div>
      </div>
      <div class="tt-bar-bg"><div class="tt-bar-fill" id="tt-bar"></div></div>
      <div class="tt-category" id="tt-category"></div>
    </div>
    <div class="tt-nodata" id="tt-nodata" style="display:none">No data available</div>
  </div>

  <div class="legend">
    <div class="legend-row" id="legend-row"></div>
  </div>
</div>

<script>
// === DATA ===
const DATA = {
  "004":1.17,"008":5.19,"012":3.66,"024":2.31,"032":6.41,"051":5.42,
  "036":8.71,"040":8.42,"031":2.87,"044":6.38,"048":2.55,"050":5.57,
  "052":6.86,"112":1.99,"056":7.93,"084":6.39,"204":3.98,"064":4.38,
  "068":4.46,"070":4.89,"072":7.29,"076":6.68,"096":3.41,"100":6.59,
  "854":3.06,"108":1.42,"116":3.17,"120":2.86,"124":8.88,"140":1.35,
  "148":1.48,"152":8.01,"156":1.94,"170":6.44,"174":3.20,"178":2.76,
  "180":1.52,"188":8.29,"384":3.63,"191":6.28,"192":2.42,"196":7.29,
  "203":7.78,"208":9.28,"262":2.74,"214":6.15,"218":5.79,"818":2.53,
  "222":6.05,"226":1.63,"232":2.03,"233":7.84,"748":3.08,"231":2.72,
  "242":5.97,"246":9.30,"250":8.07,"266":2.89,"270":4.22,"268":5.21,
  "276":8.80,"288":5.90,"300":7.56,"320":5.45,"324":2.32,"624":1.42,
  "328":6.05,"332":2.81,"340":4.65,"348":5.96,"352":8.15,"356":7.18,
  "360":6.53,"364":1.96,"368":3.59,"372":9.05,"376":7.73,"380":7.69,
  "388":7.11,"392":8.33,"400":3.41,"398":2.64,"404":4.61,"408":1.08,
  "410":8.09,"414":3.24,"417":3.62,"418":2.14,"428":7.51,"422":3.74,
  "426":5.45,"430":3.56,"434":1.90,"440":7.41,"442":8.81,"450":4.03,
  "454":4.78,"458":7.30,"466":4.39,"478":3.66,"480":8.14,"484":6.38,
  "498":5.82,"496":6.36,"499":5.74,"504":4.79,"508":3.51,"104":1.74,
  "516":6.52,"524":4.49,"528":9.00,"554":9.61,"558":3.17,"562":3.50,
  "566":3.96,"578":9.81,"512":3.04,"586":3.25,"275":3.88,"591":7.18,
  "598":6.36,"600":6.35,"604":5.92,"608":6.12,"616":6.81,"620":7.95,
  "634":3.24,"642":6.35,"643":2.22,"646":2.53,"682":2.08,"686":4.64,
  "688":6.38,"694":3.49,"702":6.02,"703":6.88,"705":7.69,"706":0.00,
  "710":7.05,"728":0.56,"724":8.07,"144":5.16,"736":2.57,"740":6.44,
  "752":9.39,"756":9.14,"760":1.43,"158":8.92,"762":1.82,"834":4.21,
  "764":4.35,"626":7.06,"768":3.22,"780":7.16,"788":5.40,"792":4.35,
  "795":1.66,"800":4.40,"804":3.36,"784":2.90,"826":8.54,"840":7.85,
  "858":8.61,"860":1.86,"862":2.33,"704":2.14,"887":1.95,"894":3.28,
  "716":2.55
};

const CATEGORIES = [
  { label: "Full Democracy", range: [8,10], colors: ["#047857","#34d399"], swatch: "#059669" },
  { label: "Flawed Democracy", range: [6,8], colors: ["#1d4ed8","#60a5fa"], swatch: "#2563eb" },
  { label: "Hybrid Regime", range: [4,6], colors: ["#d97706","#fbbf24"], swatch: "#d97706" },
  { label: "Authoritarian", range: [0,4], colors: ["#6b0f0f","#ef4444"], swatch: "#b91c1c" },
];

function getColor(score) {
  if (score === undefined || score === null) return "#1e1e2e";
  if (score < 4) return d3.interpolateRgb("#6b0f0f","#ef4444")(score/4);
  if (score < 6) return d3.interpolateRgb("#d97706","#fbbf24")((score-4)/2);
  if (score < 8) return d3.interpolateRgb("#1d4ed8","#60a5fa")((score-6)/2);
  return d3.interpolateRgb("#047857","#34d399")((score-8)/2);
}

function getCategory(score) {
  if (score === undefined || score === null) return "No Data";
  if (score < 4) return "Authoritarian";
  if (score < 6) return "Hybrid Regime";
  if (score < 8) return "Flawed Democracy";
  return "Full Democracy";
}

// === LEGEND ===
const legendRow = document.getElementById("legend-row");
CATEGORIES.forEach(c => {
  const item = document.createElement("div");
  item.className = "legend-item";
  item.innerHTML = `
    <div class="legend-swatch" style="background:linear-gradient(135deg,${c.colors[0]},${c.colors[1]})"></div>
    <div>
      <div class="legend-label">${c.label}</div>
      <div class="legend-range">${c.range[0]}–${c.range[1]} score</div>
    </div>`;
  legendRow.appendChild(item);
});
const noDataItem = document.createElement("div");
noDataItem.className = "legend-item";
noDataItem.style.flex = "0 1 auto";
noDataItem.innerHTML = `<div class="legend-swatch" style="background:#1e1e2e"></div><div><div class="legend-label">No Data</div></div>`;
legendRow.appendChild(noDataItem);

// === TOOLTIP ===
const ttEl = document.getElementById("tooltip");
const ttName = document.getElementById("tt-name");
const ttScore = document.getElementById("tt-score");
const ttBar = document.getElementById("tt-bar");
const ttCategory = document.getElementById("tt-category");
const ttData = document.getElementById("tt-data");
const ttNodata = document.getElementById("tt-nodata");

function showTooltip(name, id, mx, my) {
  const score = DATA[id];
  ttName.textContent = name;
  if (score !== undefined) {
    ttData.style.display = "block";
    ttNodata.style.display = "none";
    const col = getColor(score);
    ttScore.textContent = score.toFixed(2);
    ttScore.style.color = col;
    ttBar.style.width = (score * 10) + "%";
    ttBar.style.background = `linear-gradient(90deg, ${col}, ${col}cc)`;
    ttCategory.textContent = getCategory(score);
    ttCategory.style.color = col;
    ttEl.style.border = `1px solid ${col}44`;
    ttEl.style.boxShadow = `0 8px 32px rgba(0,0,0,0.5), 0 0 20px ${col}22`;
  } else {
    ttData.style.display = "none";
    ttNodata.style.display = "block";
    ttEl.style.border = "1px solid #2a2a3e";
    ttEl.style.boxShadow = "0 8px 32px rgba(0,0,0,0.5)";
  }
  ttEl.style.left = (mx + 18) + "px";
  ttEl.style.top = (my - 10) + "px";
  ttEl.classList.add("visible");
}
function hideTooltip() { ttEl.classList.remove("visible"); }

// === MAP ===
const W = 960, H = 500;
const svg = d3.select("#map-svg").attr("viewBox", `0 0 ${W} ${H}`);
const projection = d3.geoNaturalEarth1().fitSize([W, H], { type: "Sphere" });
const path = d3.geoPath().projection(projection);

const g = svg.append("g");

// Graticule
g.append("path")
  .datum(d3.geoGraticule10())
  .attr("d", path)
  .attr("fill", "none").attr("stroke", "#1e1e30").attr("stroke-width", 0.4);

// Sphere outline
g.append("path")
  .datum({ type: "Sphere" })
  .attr("d", path)
  .attr("fill", "none").attr("stroke", "#2a2a40").attr("stroke-width", 0.8);

let hoveredId = null;

// Zoom
const zoom = d3.zoom().scaleExtent([1, 12]).on("zoom", e => {
  g.attr("transform", e.transform);
  g.selectAll(".country-path")
    .attr("stroke-width", d => (d.id === hoveredId ? 1.8 : 0.5) / e.transform.k);
  g.select(".graticule").attr("stroke-width", 0.4 / e.transform.k);
});
svg.call(zoom);

// Fetch & render
fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json")
  .then(r => r.json())
  .then(topo => {
    const countries = topojson.feature(topo, topo.objects.countries).features;

    g.selectAll(".country-path")
      .data(countries)
      .enter().append("path")
      .attr("class", "country-path")
      .attr("d", path)
      .attr("fill", d => getColor(DATA[d.id]))
      .attr("stroke", "#0b0b14")
      .attr("stroke-width", 0.5)
      .on("mouseenter", function(event, d) {
        hoveredId = d.id;
        d3.select(this)
          .raise()
          .attr("stroke", "#fff")
          .attr("stroke-width", 1.8 / d3.zoomTransform(svg.node()).k)
          .style("filter", "drop-shadow(0 0 6px rgba(255,255,255,0.25))");
        g.selectAll(".country-path")
          .style("opacity", dd => dd.id === d.id ? 1 : 0.4);
        showTooltip(d.properties.name, d.id, event.clientX, event.clientY);
      })
      .on("mousemove", function(event) {
        ttEl.style.left = (event.clientX + 18) + "px";
        ttEl.style.top = (event.clientY - 10) + "px";
      })
      .on("mouseleave", function() {
        hoveredId = null;
        d3.select(this)
          .attr("stroke", "#0b0b14")
          .attr("stroke-width", 0.5 / d3.zoomTransform(svg.node()).k)
          .style("filter", "none");
        g.selectAll(".country-path").style("opacity", 1);
        hideTooltip();
      });

    document.getElementById("loader").style.display = "none";
    const app = document.getElementById("app");
    app.style.display = "flex";
  })
  .catch(err => {
    document.getElementById("loader").innerHTML =
      `<p style="color:#ef4444">Error loading map: ${err.message}</p>`;
  });
</script>
</body>
</html>
